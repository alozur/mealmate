services:
  backend:
    build: ./backend
    container_name: mealmate-backend-${ENV:-prod}
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_shared:5432/${POSTGRES_DB}?ssl=disable
      - DB_SCHEMA=${DB_SCHEMA:-mealmate}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://mealmate.zurera.cloud,http://localhost:3082}
      - DEV_USER_EMAIL=${DEV_USER_EMAIL:-}
    networks:
      - mealmate-net
      - postgres_infra_network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: mealmate-frontend-${ENV:-prod}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3082}:80"
    depends_on:
      - backend
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-true}"
      - "traefik.http.routers.mealmate-${ENV:-prod}.rule=Host(`mealmate.${DOMAIN:-zurera.cloud}`)"
      - "traefik.http.routers.mealmate-${ENV:-prod}.entrypoints=web"
      - "traefik.http.routers.mealmate-${ENV:-prod}.middlewares=authelia@docker"
      - "traefik.http.services.mealmate-${ENV:-prod}.loadbalancer.server.port=80"
    networks:
      - mealmate-net
      - traefik-net

networks:
  mealmate-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET:-172.28.0.0/16}
          gateway: ${GATEWAY:-172.28.0.1}
  postgres_infra_network:
    external: true
  traefik-net:
    external: true
