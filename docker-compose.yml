services:
  backend:
    build: ./backend
    container_name: mealmate-backend-${ENV:-prod}
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_shared:5432/${POSTGRES_DB}?ssl=disable
      - DB_SCHEMA=${DB_SCHEMA:-mealmate}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3082}
      - JWT_SECRET=${JWT_SECRET}
      - INVITE_CODE=${INVITE_CODE}
    networks:
      - mealmate-net
      - postgres_infra_network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: mealmate-frontend-${ENV:-prod}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3082}:80"
    depends_on:
      - backend
    networks:
      - mealmate-net

networks:
  mealmate-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET:-172.28.0.0/16}
          gateway: ${GATEWAY:-172.28.0.1}
  postgres_infra_network:
    external: true
