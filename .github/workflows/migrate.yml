name: Migrate

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

jobs:
  migrate:
    name: Run Database Migrations
    runs-on: [self-hosted, synology]
    environment: ${{ inputs.environment }}
    env:
      ENV: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat <<EOF > .env
          ENV=${ENV}
          POSTGRES_USER=${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ vars.POSTGRES_DB }}
          DB_SCHEMA=${{ vars.DB_SCHEMA }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL=${{ vars.OPENAI_MODEL }}
          CORS_ORIGINS=${{ vars.CORS_ORIGINS }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          INVITE_CODE=${{ vars.INVITE_CODE }}
          EOF

      - name: Build backend image
        run: docker compose -p mealmate-${ENV} build backend

      - name: Run alembic upgrade head
        run: docker compose -p mealmate-${ENV} run --rm backend alembic upgrade head

      - name: Cleanup .env
        if: always()
        run: rm -f .env
